      - name: criteo
        identifier: raw_gz_criteo

              
              



models:
  - name: test
    description: model qui listent mes références produit
    columns:
      - name: products_id
        description: clé primaire de ma table test et liste de mes références produit 
        tests:
          - unique
          - not_null
          
      - name: purchase_price
  - name: stock
    columns:
      - name: product_id_pk
        description: primary key product ID
        tests:
          - unique
          - not_null 
  - name: int_campaigns
    columns:
      - name: paid_source
        tests:
          - not_null
      - name: campaign_name
        tests:
          - not_null
    tests:
      - unique:
          column_name: "(campaign_key || '_' || date_date)"
  - name: finance_campaigns_month
    columns:
      - name: ads_margin
        description: ads margin calculation...

        
